name: Build
on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux-build:
    runs-on: ${{ matrix.runner }}
    container:
      image: ghcr.io/hairyhenderson/gomplate-ci-build
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: '386'
            runner: ubuntu-latest
          - goarch: 'amd64'
            runner: ubuntu-latest
          - goarch: 'arm'
            goarm: '7'
            runner: ubuntu-latest
          - goarch: 'arm64'
            runner: ubuntu-24.04-arm
    steps:
      # Only needed for arm (32-bit) running on an amd64 host; arm64 uses a native runner
      - name: Set up QEMU
        if: matrix.goarch == 'arm'
        uses: docker/setup-qemu-action@v3.7.0
      - run: |
          git config --global user.email "bogus@example.com"
          git config --global user.name "Someone"
          git config --global --add safe.directory /__w/gomplate/gomplate
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-${{ runner.arch }}-${{ matrix.goarch }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-${{ matrix.goarch }}-go-
      - run: make build GOARCH=${{ matrix.goarch }} GOARM=${{ matrix.goarm }}
      - run: make test GOARCH=${{ matrix.goarch }} GOARM=${{ matrix.goarm }}
      - run: make integration GOARCH=${{ matrix.goarch }} GOARM=${{ matrix.goarm }}
  windows-build:
    runs-on: windows-latest
    env:
      # note: the tmp dir is set to C: so that it's not on the same drive as the
      # repo, which is on D: - this will expose bugs with path handling!
      TMP: C:\tmp
    steps:
      - run: pwd
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: |
          git config --global user.email "bogus@example.com"
          git config --global user.name "Someone"
      - run: make build
      - run: make test
      - run: make integration
